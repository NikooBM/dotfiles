# ╔══════════════════════════════════════════════════════════════╗
# ║              HYPRLAND CONFIG — v4 (corregido)                ║
# ║         ~/.config/hypr/hyprland.conf                         ║
# ╚══════════════════════════════════════════════════════════════╝

# ─── NVIDIA ──────────────────────────────────────────────────────
# [FIX-1] WLR_NO_HARDWARE_CURSORS eliminado → sustituido por
#         cursor { no_hardware_cursors = true } más abajo (forma
#         correcta en Hyprland moderno, el env var está obsoleto).
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

# ─── WAYLAND ─────────────────────────────────────────────────────
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1

# ─── MONITORES ───────────────────────────────────────────────────
monitor = HDMI-A-2, 1920x1080@200Hz, 0x0, 1
monitor = HDMI-A-1, 1920x1080@60Hz, 1920x0, 1, transform, 2
monitor = , preferred, auto, 1

exec-once = wpctl set-default 63
exec-once = wpctl set-volume 63 0.5
exec-once = wpctl set-mute 63 0

# ─── AUTOSTART ───────────────────────────────────────────────────
# [FIX-2] Añadidos DISPLAY y XDG_SESSION_TYPE al import-environment.
#         Los portales los necesitan para funcionar correctamente.
exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE HYPRLAND_INSTANCE_SIGNATURE

# [FIX-3] Eliminados los exec-once de xdg-desktop-portal y
#         xdg-desktop-portal-hyprland. En Fedora ambos están
#         gestionados por systemd (D-Bus activation). Lanzarlos
#         manualmente creaba instancias dobles, portapapeles roto
#         y screensharing fallido.
exec-once = lxpolkit
exec-once = hyprpaper
exec-once = waybar
exec-once = mako
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = pasystray
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Apps al inicio
exec-once = rm -f ~/.config/vivaldi/Singleton*
exec-once = [workspace 1] vivaldi --password-store=basic
exec-once = [workspace 2] flatpak run md.obsidian.Obsidian
exec-once = [workspace 7] thunar

# ─── CURSOR (NVIDIA) ─────────────────────────────────────────────
# [FIX-1 cont.] Forma idiomática moderna para deshabilitar cursores
#               hardware en NVIDIA (sustituye WLR_NO_HARDWARE_CURSORS).
cursor {
    no_hardware_cursors = true
}


# ─── APARIENCIA ──────────────────────────────────────────────────
general {
    gaps_in  = 5
    gaps_out = 8
    border_size = 2

    col.active_border   = rgba(4c7899ff)
    col.inactive_border = rgba(1a1f2eff)

    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 8
}

decoration {
    rounding = 8

    blur {
        enabled  = true
        size     = 5
        passes   = 2
        # [FIX-4] Eliminado new_optimizations: opción obsoleta/eliminada
        #         en Hyprland moderno, generaba warnings o errores silenciosos.
        xray     = false
    }

    shadow {
        enabled        = true
        range          = 12
        render_power   = 2
        color          = rgba(00000055)
        color_inactive = rgba(00000030)
    }

    inactive_opacity   = 0.93
    active_opacity     = 1.0
    fullscreen_opacity = 1.0
    dim_inactive       = true
    dim_strength       = 0.07
}

animations {
    enabled = true

    bezier = easeOut, 0.16, 1,   0.3, 1
    bezier = snap,    0.05, 0.9, 0.1, 1.05

    animation = windows,     1, 4, snap,    slide
    animation = windowsOut,  1, 3, easeOut, slide
    animation = windowsMove, 1, 3, easeOut
    animation = border,      1, 6, easeOut
    animation = fade,        1, 4, easeOut
    animation = workspaces,  1, 4, easeOut, slide
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = false
    smart_resizing = true
    force_split    = 2
}

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    animate_manual_resizes   = true
    # [FIX-5] focus_on_activate false: evita que apps roben el foco
    #         inesperadamente (era true, causaba saltos molestos).
    focus_on_activate        = false
    # [NEW-1] vfr: Variable Frame Rate — reduce uso de GPU cuando no
    #         hay animaciones activas. Muy útil con NVIDIA.
    vfr                      = true
    # [NEW-2] Limita FPS de ventanas sin foco para ahorrar GPU.
    render_unfocused_fps     = 15
}


# ─── INPUT ───────────────────────────────────────────────────────
input {
    kb_layout    = es
    kb_options   = caps:escape
    follow_mouse = 2
    sensitivity  = 0
    repeat_rate  = 25
    repeat_delay = 300
}


# ─── MODIFICADOR ─────────────────────────────────────────────────
$mod = ALT


# ─── ATAJOS PRINCIPALES ──────────────────────────────────────────
bind = $mod, Return,      exec, kitty
bind = $mod, Q,           killactive
bind = $mod SHIFT, E,     exec, hyprctl dispatch exit
# Recargar config + reiniciar waybar
bind = $mod SHIFT, C,     exec, hyprctl reload && sleep 0.5 && killall waybar; waybar &

# Lanzadores
bind = $mod, D,           exec, wofi --show drun --allow-images
bind = $mod SHIFT, D,     exec, wofi --show run
bind = SUPER, Tab,        exec, ~/.config/hypr/scripts/app-switcher.py

# Portapapeles (cliphist)
bind = $mod SHIFT, V,     exec, ~/.config/waybar/scripts/clipboard-menu.sh

# Bloqueo
bind = $mod SHIFT, X, exec, loginctl lock-session && sleep 2 && hyprctl dispatch dpms off
bind = $mod SHIFT, S,     exec, loginctl lock-session && sleep 1 && systemctl suspend


# ─── ATAJOS APPS ─────────────────────────────────────────────────
bind = $mod, dead_grave,  exec, ~/.config/hypr/scripts/focus-or-open.sh vivaldi-stable vivaldi
bind = $mod, dead_acute,  exec, ~/.config/hypr/scripts/focus-or-open.sh code code
bind = $mod, P,           exec, ~/.config/hypr/scripts/focus-or-open.sh obsidian 'flatpak run md.obsidian.Obsidian'
bind = $mod, period,      exec, ~/.config/hypr/scripts/focus-or-open.sh thunar thunar


# ─── CAPTURAS ────────────────────────────────────────────────────
bind = , Print,           exec, bash -c 'f=~/Pictures/ss-$(date +%Y%m%d-%H%M%S).png; grim "$f" && notify-send "📸 Captura" "$f"'
bind = $mod, Print,       exec, bash -c 'f=~/Pictures/ss-$(date +%Y%m%d-%H%M%S).png; grim -g "$(slurp)" "$f" && notify-send "📸 Captura" "$f"'


# ─── MULTIMEDIA ──────────────────────────────────────────────────
bind = , XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute,      exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-


# ─── FOCO DE VENTANAS ────────────────────────────────────────────
bind = $mod, H,     movefocus, l
bind = $mod, J,     movefocus, d
bind = $mod, K,     movefocus, u
bind = $mod, L,     movefocus, r
bind = $mod, left,  movefocus, l
bind = $mod, down,  movefocus, d
bind = $mod, up,    movefocus, u
bind = $mod, right, movefocus, r
bind = $mod, Tab,   workspace, previous


# ─── MOVER VENTANAS ──────────────────────────────────────────────
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, J,     movewindow, d
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, right, movewindow, r
bindm = $mod, mouse:272,  movewindow
bindm = $mod, mouse:273,  resizewindow


# ─── LAYOUT ──────────────────────────────────────────────────────
bind = $mod, F,           fullscreen, 0
bind = $mod SHIFT, F,     fullscreen, 1
bind = $mod SHIFT, Space, togglefloating
bind = $mod, Space,       focusurgentorlast
bind = $mod, E,           pseudo
bind = $mod, S,           togglesplit


# ─── REDIMENSIONAR ───────────────────────────────────────────────
bind = $mod SHIFT, minus,  resizeactive, -40 0
bind = $mod SHIFT, period, resizeactive,  40 0

bind = $mod, R, submap, resize
submap = resize
    binde = , left,  resizeactive, -20   0
    binde = , right, resizeactive,  20   0
    binde = , up,    resizeactive,   0 -20
    binde = , down,  resizeactive,   0  20
    binde = , H,     resizeactive, -20   0
    # [FIX-7] J/L estaban intercambiados: J debe redimensionar hacia
    #         abajo (0 20) y L hacia la derecha (20 0).
    binde = , J,     resizeactive,   0  20
    binde = , K,     resizeactive,   0 -20
    binde = , L,     resizeactive,  20   0
    bind  = , Return, submap, reset
    bind  = , Escape, submap, reset
submap = reset


# ─── WORKSPACES ──────────────────────────────────────────────────
bind = $mod, 1,  workspace, 1
bind = $mod, 2,  workspace, 2
bind = $mod, 3,  workspace, 3
bind = $mod, 4,  workspace, 4
bind = $mod, 5,  workspace, 5
bind = $mod, 6,  workspace, 6
bind = $mod, 7,  workspace, 7
bind = $mod, 8,  workspace, 8
bind = $mod, 9,  workspace, 9
bind = $mod, 0,  workspace, 10

bind = $mod SHIFT, 1,  movetoworkspace, 1
bind = $mod SHIFT, 2,  movetoworkspace, 2
bind = $mod SHIFT, 3,  movetoworkspace, 3
bind = $mod SHIFT, 4,  movetoworkspace, 4
bind = $mod SHIFT, 5,  movetoworkspace, 5
bind = $mod SHIFT, 6,  movetoworkspace, 6
bind = $mod SHIFT, 7,  movetoworkspace, 7
bind = $mod SHIFT, 8,  movetoworkspace, 8
bind = $mod SHIFT, 9,  movetoworkspace, 9
bind = $mod SHIFT, 0,  movetoworkspace, 10

# Workspaces asignados a cada monitor
workspace = 1,  monitor:HDMI-A-2, defaultName:1
workspace = 2,  monitor:HDMI-A-2, defaultName:2
workspace = 3,  monitor:HDMI-A-2, defaultName:3
workspace = 4,  monitor:HDMI-A-2, defaultName:4
workspace = 5,  monitor:HDMI-A-2, defaultName:5
workspace = 6,  monitor:HDMI-A-2, defaultName:6
workspace = 7,  monitor:HDMI-A-1, defaultName:7
workspace = 8,  monitor:HDMI-A-1, defaultName:8
workspace = 9,  monitor:HDMI-A-1, defaultName:9
workspace = 10, monitor:HDMI-A-1, defaultName:10


# ─── REGLAS DE VENTANAS ──────────────────────────────────────────
#windowrulev2 = workspace 1,  class:^(vivaldi-stable)$
# [FIX-8] Obsidian: la regla decía workspace 3 pero exec-once la
#         manda al 8. Corregido a workspace 8 para que sea coherente.
#windowrulev2 = workspace 8,  class:^(obsidian)$
#windowrulev2 = workspace 7,  class:^(thunar)$
#windowrulev2 = workspace 5,  class:^(code)$
#windowrulev2 = workspace 6,  class:^(libreoffice.*)$

# Flotantes
windowrulev2 = float,        class:^(pavucontrol)$
windowrulev2 = size 820 560, class:^(pavucontrol)$
windowrulev2 = center,       class:^(pavucontrol)$
windowrulev2 = float,        class:^(blueman-manager)$
windowrulev2 = size 880 580, class:^(blueman-manager)$
windowrulev2 = center,       class:^(blueman-manager)$
windowrulev2 = float,        class:^(nm-connection-editor)$
windowrulev2 = center,       class:^(nm-connection-editor)$

# XWayland: rounding igual que ventanas nativas
windowrulev2 = rounding 8, xwayland:1

# Juegos: sin tearing
windowrulev2 = immediate, class:^(steam_app_.*)$
