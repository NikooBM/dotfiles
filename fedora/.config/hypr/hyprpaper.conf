# ╔══════════════════════════════════════════════════════════════╗
# ║                    HYPRPAPER CONFIG                          ║
# ║         Coloca en: ~/.config/hypr/hyprpaper.conf             ║
# ╚══════════════════════════════════════════════════════════════╝

# Precarga el wallpaper (puedes añadir varios)
preload = ~/wallpaper.jpg

# Asigna a cada monitor (o usa * para todos)
wallpaper = HDMI-A-2, ~/wallpaper.jpg
wallpaper = HDMI-A-1, ~/wallpaper.jpg

# Oculta cursor en el wallpaper
ipc = off
