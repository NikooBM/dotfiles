# ╔══════════════════════════════════════════════════════════════╗
# ║                     HYPRIDLE CONFIG (corregido)              ║
# ║         ~/.config/hypr/hypridle.conf                         ║
# ╚══════════════════════════════════════════════════════════════╝

general {
    lock_cmd         = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session

    # [FIX-9] after_sleep_cmd: el problema del segundo monitor negro
    #         al volver del reposo en NVIDIA es causado porque el
    #         driver no restaura ambos outputs a tiempo. La solución:
    #         esperar más (3 s) y forzar dpms on dos veces con pausa.
    #         La primera llamada reactiva el driver; la segunda
    #         garantiza que el segundo monitor también se encienda.
    after_sleep_cmd = sleep 3 && hyprctl dispatch dpms on && sleep 1 && hyprctl dispatch dpms on

    ignore_dbus_inhibit = false
}

# Aviso visual 5 minutos antes de bloquear
listener {
    timeout    = 300
    on-timeout = notify-send -u low "🔒 Bloqueando en 5 minutos..."
}

# Bloqueo de pantalla a los 600 segundos (10 min)
listener {
    timeout    = 600
    on-timeout = loginctl lock-session
}

# [FIX-10] Apagar monitores: aumentado a 660 s (antes 640).
#          Con el intervalo muy corto (40 s tras el lock) hyprlock
#          aún podía estar inicializándose cuando DPMS apagaba los
#          monitores, causando que la pantalla de bloqueo no se
#          mostrase correctamente al volver.
#          on-resume sigue aquí para el caso "pantalla apagada pero
#          sin suspender" (movimiento de ratón/tecla).
listener {
    timeout    = 630
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

