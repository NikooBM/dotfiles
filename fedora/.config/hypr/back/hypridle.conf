# ╔══════════════════════════════════════════════════════════════╗
# ║                     HYPRIDLE CONFIG                          ║
# ║         Coloca en: ~/.config/hypr/hypridle.conf              ║
# ╚══════════════════════════════════════════════════════════════╝

# En ~/.config/hypr/hypridle.conf, modifica el bloque general:
general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = sleep 2 && hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Aviso visual 5 minutos antes de bloquear
listener {
    timeout = 300
    on-timeout = notify-send -u low "🔒 Bloqueando en 5 minutos..."
}

# Bloqueo de pantalla a los 600 segundos (10 min)
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# Apagar monitores a los 640 segundos (10,6 min)
listener {
    timeout = 640
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspender sistema tras 30 minutos de inactividad (opcional, comenta si no quieres)
# listener {
#     timeout = 1800
#     on-timeout = systemctl suspend
# }
