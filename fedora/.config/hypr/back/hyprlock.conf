# ╔══════════════════════════════════════════════════════════════╗
# ║                     HYPRLOCK CONFIG                          ║
# ║         Coloca en: ~/.config/hypr/hyprlock.conf              ║
# ╚══════════════════════════════════════════════════════════════╝

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = ~/wallpaper.jpg
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
    contrast = 1.0
    vibrancy = 0.2
}

# Hora
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(ffffff, 1.0)
    font_size = 90
    font_family = JetBrains Mono Bold
    shadow_passes = 3
    shadow_size = 10
    position = 0, 200
    halign = center
    valign = center
}

# Fecha
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d de %B')"
    color = rgba(ffffffcc)
    font_size = 22
    font_family = JetBrains Mono
    position = 0, 110
    halign = center
    valign = center
}

# Campo de contraseña
input-field {
    monitor =
    size = 300, 55
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(4c7899ff)
    inner_color = rgba(1a1a2eee)
    font_color = rgba(ffffffff)
    fade_on_empty = true
    placeholder_text = <i>Contraseña...</i>
    hide_input = false
    rounding = 10
    check_color = rgba(2e9ef4ff)
    fail_color = rgba(ff5555ff)
    fail_text = <i>Incorrecto</i>
    capslock_color = rgba(ffb86cff)
    position = 0, -60
    halign = center
    valign = center
}
